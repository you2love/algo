<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算法学习指南 - 掌握编程核心技能</title>
    <meta name="description" content="全面的算法学习平台，包含排序、搜索、动态规划、图算法、机器学习等核心算法教程，配备可视化交互演示和实战案例">
    <style>
        .framework-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            border: 16px;
        }
        .framework-item {
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .info-card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 24px;
            margin: 32px 0;
            border-left: 5px solid #4299e1;
        }

        .info-card-title {
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-card-content {
            color: #4a5568;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="info-card">
        <div class="info-card-title"><span>💡</span> 为什么学习算法思维？</div>
        <div class="info-card-content">
            <ul style="padding-left: 20px; color: var(--text-secondary); line-height: 1.8;">
                <li><strong>举一反三</strong> — 掌握一种思维，解决一类问题</li>
                <li><strong>快速定位</strong> — 面对新问题时迅速找到解决方向</li>
                <li><strong>优化意识</strong> — 从暴力解法逐步优化到最优解</li>
                <li><strong>面试必备</strong> — 技术面试中考察的核心能力</li>
            </ul>
        </div>
    </div>

    <div class="framework-grid">
        <div class="framework-item">
            <div class="framework-item-icon">🔍</div>
            <div class="framework-item-title">问题识别</div>
            <div class="framework-item-desc">识别问题类型和特征</div>
        </div>
        <div class="framework-item">
            <div class="framework-item-icon">🧩</div>
            <div class="framework-item-title">模式匹配</div>
            <div class="framework-item-desc">匹配已知的解决模式</div>
        </div>
        <div class="framework-item">
            <div class="framework-item-icon">⚡</div>
            <div class="framework-item-title">策略选择</div>
            <div class="framework-item-desc">选择最优解决策略</div>
        </div>
        <div class="framework-item">
            <div class="framework-item-icon">🔧</div>
            <div class="framework-item-title">实现优化</div>
            <div class="framework-item-desc">高效实现并持续优化</div>
        </div>
    </div>
</body>
